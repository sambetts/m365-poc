name: SPO ColdStorage CI

on:
  push:
    branches: [main]
    paths:
      - 'SPO/ColdStorage/**'
      - '.github/workflows/spo-coldstorage-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'SPO/ColdStorage/**'
      - '.github/workflows/spo-coldstorage-build.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SPO/ColdStorage/src

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: SPO/ColdStorage/src/global.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SPO/ColdStorage/src/Web/web.client/package-lock.json

      - name: Install SPA dependencies
        working-directory: SPO/ColdStorage/src/Web/web.client
        run: npm ci

      - name: Restore
        run: dotnet restore SPO.ColdStorage.slnx

      - name: Build
        run: dotnet build SPO.ColdStorage.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test SPO.ColdStorage.slnx --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: SPO/ColdStorage/src/**/TestResults/*.trx
          if-no-files-found: ignore
